<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="
  default-src 'none';
  script-src  'self' https://cdn.jsdelivr.net;
  style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src    https://fonts.gstatic.com;
  img-src     'self' https://mlwzpgtdgfaczgxipbsq.supabase.co data:;
  media-src   'self' https://mlwzpgtdgfaczgxipbsq.supabase.co;
  connect-src 'self' https://mlwzpgtdgfaczgxipbsq.supabase.co;
  object-src  'none';
  base-uri    'self';
  form-action 'self';
  frame-ancestors 'none';
">
<!-- CSP02 — X-Frame-Options is browser-ignored when set via <meta http-equiv>.
     frame-ancestors 'none' in the CSP above does the same job (and is honoured in meta). -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>FootJoy Curate AW27 Footwear</title>

<!--
  Customer-facing footwear prebook form (AW27).
  Auth and draft patterns mirror the apparel form (../index.html). The
  shared Supabase client config lives one directory up. Section 4 of the
  AW27 footwear brief.
-->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3/dist/umd/supabase.min.js" integrity="sha384-Y1tzkgTMv0NgNIkhIaJiI9rqNrOLfosToPr6Bzp4XVIOvF1BUd7mNlUVPpo6G8lL" crossorigin="anonymous"></script>
<script src="../supabase-init.js"></script>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="templates/styles.css">
</head>
<body>

<!-- Login + season picking live at the root /index.html. The footwear form
     redirects unauthenticated users back there. Inline display:none beats
     the legacy #login-screen CSS rule that sets position:fixed and a navy
     background; we just need an empty element so getElementById doesn't
     return null in legacy code paths. -->
<div id="login-screen" style="display:none"></div>

<!-- ── HEADER (revealed after auth) ── -->
<header id="app-header" class="header" hidden>
  <div class="header-inner">
    <div class="fj-logo">
      <img src="https://mlwzpgtdgfaczgxipbsq.supabase.co/storage/v1/object/public/logos/FJ_logo_FullLockup_HRZ_W.jpg" alt="FootJoy" class="fj-logo-img">
    </div>
    <div class="header-title">
      <h1>Footwear Prebook Order Form</h1>
    </div>
    <div class="header-actions">
      <span class="header-curate-mark" aria-hidden="true">
        <img src="https://mlwzpgtdgfaczgxipbsq.supabase.co/storage/v1/object/public/logos/curate-logo-w.png" alt="FJ Curate">
      </span>
      <button class="header-menu-btn" id="header-menu-btn" type="button"
              data-fw-action="toggleHeaderMenu"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="header-menu"
              aria-label="Open menu">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <line x1="4" y1="7"  x2="20" y2="7"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="4" y1="17" x2="20" y2="17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <!-- Legacy invisible signout button retained so app.js's existing
           addEventListener for #signout-btn keeps working. -->
      <button id="signout-btn" type="button" hidden>Sign out</button>
      <span id="header-user" class="header-user" hidden></span>
    </div>
  </div>

  <!-- Header menu dropdown. Hidden by default. -->
  <div class="header-menu" id="header-menu" role="menu" aria-labelledby="header-menu-btn" hidden>
    <div class="header-menu-profile">
      <div class="header-menu-profile-name" id="header-menu-profile-name">Signed in</div>
      <div class="header-menu-profile-email" id="header-menu-profile-email">-</div>
    </div>
    <div class="header-menu-sep"></div>
    <button class="header-menu-item" role="menuitem" type="button" data-fw-menu="back-to-seasons">
      <span class="header-menu-icon">&larr;</span>
      <span>Back to Home</span>
    </button>
    <button class="header-menu-item" role="menuitem" type="button" data-fw-menu="save">
      <span class="header-menu-icon">&#128190;</span>
      <span>Save draft</span>
    </button>
    <div class="header-menu-sep"></div>
    <button class="header-menu-item header-menu-item-danger" role="menuitem" type="button" data-fw-menu="clear">
      <span class="header-menu-icon">&#10005;</span>
      <span>Clear order</span>
    </button>
    <div class="header-menu-sep"></div>
    <button class="header-menu-item" role="menuitem" type="button" data-fw-menu="sign-out">
      <span class="header-menu-icon">&#9099;</span>
      <span>Sign out</span>
    </button>
  </div>
</header>

<!-- ── MAIN: one view is mounted at a time ── -->
<main id="app-main" hidden>
  <section id="view-questionnaire" class="view"></section>
  <section id="view-reorder" class="view" hidden></section>
  <section id="view-deck" class="view" hidden></section>
  <section id="view-catalogue" class="view" hidden></section>
  <section id="view-summary" class="view" hidden></section>
</main>

<!--
  Persistent fixed footer that hugs the bottom of the viewport during
  the deck and catalogue views (mirrors the apparel form pattern). Cart
  state, fullscreen toggle, save, and review live here. Hidden on the
  questionnaire / reorder / summary views.
-->
<footer id="fw-app-footer" class="cart-summary" hidden></footer>

<!-- ── TOAST CONTAINER ── -->
<div id="toast-container"></div>

<!--
  Scripts load in dependency order:
    cart.js            - cart state, picker, review modal, submit
    slide-renderer.js  - registry: register(template_key, render); renderSlide(...)
    templates/*.js     - each template registers itself
    questionnaire.js   - questionnaire view (Phase C1)
    reorder.js         - reorder view (Phase C2)
    deck.js            - deck view (Phase C3)
    catalogue.js       - full footwear catalogue (post-deck)
    summary.js         - customer review summary
    app.js             - controller; reads from all of the above (loaded last)
-->
<script src="cart.js"></script>
<script src="slide-renderer.js"></script>
<script src="slide-product-strip.js"></script>
<script src="templates/hero_full_bleed.js"></script>
<script src="templates/video_focus.js"></script>
<script src="templates/tabbed_feature_showcase.js"></script>
<script src="templates/split_story.js"></script>
<script src="templates/heading_with_media.js"></script>
<!-- Print container: hidden on screen, exclusive on print. The cart's
     generateCustomerPDF() injects the order layout into this node and
     calls window.print(), which the @media print rule lets render
     full-bleed while every other element on the page is hidden. -->
<div id="print-container"></div>

<style>
  #print-container { display: none; }
  @media print {
    body > *:not(#print-container) { display: none !important; }
    #print-container {
      display: block !important;
      position: static !important;
      width: 100% !important;
      background: white !important;
    }
    body {
      margin: 0 !important;
      padding: 0 !important;
      background: white !important;
    }
    @page { margin: 12mm; }
  }
</style>

<script src="templates/three_button_swap.js"></script>
<script src="templates/four_button_swap.js"></script>
<script src="templates/title_page.js"></script>
<script src="questionnaire.js"></script>
<script src="reorder.js"></script>
<script src="deck.js"></script>
<script src="catalogue.js"></script>
<script src="summary.js"></script>
<script src="app.js"></script>
</body>
</html>
